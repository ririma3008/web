<!DOCTYPE html>
<html>
<head>
    <title>Student Information Form</title>
    <link rel="stylesheet" href="web_w3.css">
</head>
<body>

    <fieldset>
        <legend>Student Information</legend>

        <table>
            <tr>
                <td>
                    <label>Full Name (Text)</label><br>
                    <input type="text" placeholder="Enter your full name">
                </td>

                <td>
                    <label>Email Address</label><br>
                    <input type="email" placeholder="your email@example.com">
                </td>
            </tr>

            <tr>
                <td>
                    <label>Password</label><br>
                    <input type="password" placeholder="Enter secure password">
                </td>

                <td>
                    <label>Age (Number)</label><br>
                    <input type="number" placeholder="Enter your age">
                </td>
            </tr>

            <tr>
                <td>
                    <label>Experiment Date</label><br>
                    <input type="date">
                </td>

                <td>
                    <label>Phone Number (Tel)</label><br>
                    <input type="tel" placeholder="+880 XXXX XXXXXX">
                </td>
            </tr>

            <tr>
                <td colspan="2">
                <div class = "container">
                
                    <input type="submit" value="SUBMIT" class="submit-btn">
                    <input type="reset" value="CLEAR" class="clear-btn">
                    
        
                </div>
                </td>
            </tr>
        </table>

    </fieldset>


</body>
</html>
