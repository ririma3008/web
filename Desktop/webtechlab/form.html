<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>
</head>

<body>

<form>

    <h2>Registration Form</h2>

    <table border="1">

        <tr>
            <th colspan="2">REG FORM</th>
        </tr>

        <tr>
            <td>Name:</td>
            <td><input type="text" name="name"></td>
        </tr>

        <tr>
            <td>Password:</td>
            <td><input type="password" name="password"></td>
        </tr>

        <tr>
            <td>Submit:</td>
            <td><input type="submit" value="Register"></td>
        </tr>

    </table>

</form>

</body>
</html>
